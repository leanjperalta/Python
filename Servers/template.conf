# /etc/nginx/sites-available/api-proxy-ssl.conf

# ------------------------------------------------------------------
# 1. HTTP → HTTPS REDIRECT (optional but recommended)
# ------------------------------------------------------------------
server {
    listen 192.168.0.21:80;
    server_name api.garrahan.gov.ar;

    # Redirect everything to HTTPS
    return 301 https://$server_name$request_uri;
}

# ------------------------------------------------------------------
# 2. HTTPS ONLY (SSL/TLS) VIRTUAL HOST
# ------------------------------------------------------------------
server {
    listen 192.168.0.21:443 ssl http2;          
    server_name api.garrahan.gov.ar;   

    # ----------------------------------------------------------------
    # SSL/TLS Configuration (Let's Encrypt or your certs)
    # ----------------------------------------------------------------

    ssl_certificate     /etc/nginx/certs/STAR.garrahan.gov.ar.crt;
    ssl_certificate_key /etc/nginx/certs/STAR.garrahan.gov.ar.key;
#    ssl_trusted_certificate /etc/nginx/certs/sectigo-intermediate.crt;

    ssl_stapling on;
    ssl_stapling_verify on;

    #ModSecurity
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/main.conf;
    server_tokens off;

    #Evita mostar informacion del servidor que atiende
    proxy_hide_header Server;


    #Logs
    access_log /var/log/nginx/reverse-proxy.access.log upstream_log;
    error_log /var/log/nginx/reverse-proxy.error.log;




    # Optional: Strong security (A+ on SSL Labs)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (optional but recommended)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----------------------------------------------------------------
    # 3. Proxy to your API backend
    # ----------------------------------------------------------------
    location / {
        proxy_pass         http://172.32.20.83:8080;
        proxy_http_version 1.1;

        # === REQUIRED HEADERS ===
        proxy_set_header   Host            172.32.20.83:8080;
        proxy_set_header   Connection      "keep-alive";
        proxy_set_header   Accept-Encoding "gzip, deflate, br";

        # === REDIRECT FOLLOWING ===
        proxy_redirect     off;
        proxy_intercept_errors on;
        error_page 301 302 307 308 = @follow_redirect;

        # === KEEP-ALIVE TO UPSTREAM ===
        proxy_set_header   Connection "";
        keepalive_timeout  65s;
        keepalive_requests 100;

        # === FORWARDED HEADERS ===
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Port 443;

        # === BUFFERING (optional) ===
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ----------------------------------------------------------------
    # Hidden location: follows 301/302 from backend
    # ----------------------------------------------------------------
    location @follow_redirect {
        proxy_pass http://172.32.20.83:8080;
        proxy_set_header Host 172.32.20.83:8080;
        proxy_set_header Connection "keep-alive";
        proxy_set_header Accept-Encoding "gzip, deflate, br";
        proxy_http_version 1.1;
    }
}